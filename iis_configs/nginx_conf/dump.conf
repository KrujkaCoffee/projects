
#user  nobody;
worker_processes  8;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}
http {
    upstream db_files {
        server 127.0.0.1:5600;
        server 127.0.0.1:5601;
        server 127.0.0.1:5602;
        server 127.0.0.1:5603;
        server 127.0.0.1:5604;
    }
    upstream db_kplan {
        server 127.0.0.1:5700;
        server 127.0.0.1:5701;
        server 127.0.0.1:5702;
        server 127.0.0.1:5703;
        server 127.0.0.1:5704;
    }

    server {
        listen 0.0.0.0:20006;
        server_name srv-mes;

        location / {
            proxy_pass http://db_files;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    server {
        listen 0.0.0.0:20007;
        server_name srv-mes;

        location / {
            proxy_pass http://db_kplan;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
